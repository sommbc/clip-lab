name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system media tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Python package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,video]"

      - name: Python tests
        run: python -m pytest

      - name: Python lint
        run: python -m ruff check apps packages tests

      - name: Python compile
        run: python -m compileall apps/api packages

      - name: API import check
        run: python -c "import cliplab_api.main; print('api import ok')"

      - name: CLI help check
        run: clip-lab --help

  renderer:
    name: Renderer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Renderer TypeScript build
        working-directory: apps/renderer
        run: npm ci && npm run build

      - name: Renderer service TypeScript build
        working-directory: apps/renderer/service
        run: npm ci && npm run build

  web:
    name: Optional web demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Web build
        working-directory: apps/web
        run: npm ci && npm run lint && npm run build

  docker:
    name: Docker compose smoke
    runs-on: ubuntu-latest
    needs: [backend, renderer]
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Create local env file
        run: cp .env.example .env

      - name: Docker compose build
        run: docker compose build

      - name: Start API and renderer
        run: docker compose up -d --wait

      - name: Fixture no-render smoke
        run: |
          docker compose exec -T api clip-lab /app/fixtures/sample.mp4 \
            --transcript-json /app/fixtures/sample.transcript.json \
            --output-root /app/output \
            --job-id ci-fixture-no-render \
            --no-render

      - name: Stop compose stack
        if: always()
        run: docker compose down
